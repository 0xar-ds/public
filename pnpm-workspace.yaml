packages:
  - 'apps/**'
  - 'libs/**'

allowBuilds:
  '@nestjs/core': true
  '@swc/core': true
  necord: true
  unrs-resolver: true

catalogs:
  nest:
    "@nestjs/common": 11.1.28
    "@nestjs/core": 11.1.28
    "@nestjs/testing": 11.1.28

    "@nestjs/platform-express": 11.1.28

    "@nestjs/cli": 11.0.24
    "@nestjs/schematics": 11.1.0

  nest-libs:
    "nest-typed-config": 2.10.1

    "@ogma/common": 1.2.0
    "@ogma/nestjs-module": 5.5.2
    "@ogma/styler": 1.1.0

  swc:
    "@swc/cli": 0.8.1
    "@swc/core": 1.15.43

  environment:
    "@types/express": 5.0.6
    "@types/node": 24.13.3
    "@types/jest": 30.0.0

  code-quality:
    "eslint": 10.7.0
    "prettier": 3.8.5

    "@eslint/compat": 2.1.0
    "@eslint/js": 10.0.1

    "typescript-eslint": 8.64.0
    "@typescript-eslint/parser": 8.64.0
    "eslint-import-resolver-typescript": 4.4.5

    "eslint-config-prettier": 10.1.8

    "eslint-plugin-import-x": 4.17.1
    "eslint-plugin-svelte": 3.20.0

    "globals": 17.7.0

  libraries:
    "rxjs": 7.8.2
    "class-transformer": 0.5.1
    "class-validator": 0.15.1

  utilities:
    "tsconfig-paths": 4.2.0
    "reflect-metadata": 0.2.2
    "source-map-support": 0.5.21

  build-tooling:
    "typescript": 6.0.3
    "ts-loader": 9.6.2
    "ts-node": 10.9.2
    "@changesets/cli": 2.31.1
    "conventional-changelog-conventionalcommits": 10.2.1
    "@commitlint/cli": 21.2.1
    "@commitlint/config-angular": 21.2.0

  jest:
    "jest": 30.4.2

  test-tooling:
    "ts-jest": 29.4.11

  discord:
    "necord": "^6.14.0"
    "discord.js": "^14.26.5"
    "discord-api-types": "^0.38.49"
