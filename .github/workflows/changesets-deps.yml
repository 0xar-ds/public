name: Add changeset to Renovate updates

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

jobs:
  renovate:
    name: Update Renovate PR
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'dependencies')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Toolchain
        uses: moonrepo/setup-toolchain@65d53643a42a85e876ee676b40318b96d1885fb5 # v0
        with:
          auto-install: true

      - name: Install dependencies
        run: pnpm install

      - name: Update PR
        uses: mscharley/dependency-changesets-action@e704c89dbc4e284d055aa520308291690f645a4f # v1.2.2
        with:
          token: ${{ secrets.PR_GITHUB_TOKEN }}
          use-conventional-commits: true
          author-name: github-actions[bot]
          author-email: github-actions[bot]@users.noreply.github.com
