$schema: https://moonrepo.dev/schemas/workspace.json

telemetry: false

notifier:
  terminalNotifications: always

projects:
  sources:
    root: .
  globs:
    - apps/**/moon.yml
    - libs/**/moon.yml

pipeline:
  logRunningCommand: true

constraints:
  enforceLayerRelationships: true

vcs:
  hooks:
    commit-msg:
    - pnpm commitlint --config .commitlintrc.json --edit $1
    pre-commit:
    - moon run :lint :format --affected --status=staged

docker:
  scaffold:
    configsPhaseGlobs:
    - ./types/**/*

generator:
  templates:
  - templates/**