inheritedBy:
  tag: vitest

implicitDeps:
  - ^:build

tasks:
  test:
    type: test
    description: Runs vitest. Assumes project has Vitest configured.
    command: vitest --run
    env:
      NODE_ENV: testing
    inputs:
      - '@group(sources)'
      - '@group(configs)'
      - '@group(tests)'
  test/watch:
    type: test
    description: Runs vitest with the --watch flag. Assumes project has Vitest configured.
    command: vitest watch
    env:
      NODE_ENV: testing
