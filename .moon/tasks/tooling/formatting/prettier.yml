inheritedBy:
  tag: prettier

tasks:
  format:
    type: test
    description: Runs prettier without writing/formatting unstyled input.
    command: prettier
    args:
      - --check
      - --cache
      - --cache-location=.prettiercache
      - --no-error-on-unmatched-pattern
      - .
    inputs:
      - '@group(sources)'
      - '@group(configs)'
      - '@group(tests)'
    outputs:
      - .prettiercache
  format-write:
    preset: utility
    extends: format
    args:
      - --write
      - --cache
      - --cache-location=.prettiercache
      - --no-error-on-unmatched-pattern
      - .
    inputs:
      - '@group(sources)'
      - '@group(configs)'
      - '@group(tests)'
    outputs:
      - .prettiercache
    options:
      runInCI: false
      mergeArgs: replace
