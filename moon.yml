id: root

project:
  title: Moon Monorepo
  description: Root project of this monorepo

tasks:
  version-packages:
    type: build
    description: Consumes changes and updates entries to the according semver bump
    script: 'changeset version && (git diff --quiet || pnpm install --no-frozen-lockfile)'
    deps:
      - '#releasable:prepare'
    options:
      runInCI: false
  publish-packages:
    type: run
    description: Publishes the artifact to configured mediums
    command: changeset publish
    deps:
      - ~:version-packages
    options:
      runInCI: false
